<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📝 Rumah17 - Catatan Penting</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 16px;
      margin: 0;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }
    select, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
      box-sizing: border-box;
    }
    textarea {
      height: 150px;
      resize: vertical;
    }
    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      opacity: 0.9;
    }
    .btn-secondary {
      background-color: #2196F3;
    }
    .btn-danger {
      background-color: #f44336;
    }
    .status {
      padding: 8px;
      border-radius: 4px;
      margin-top: 12px;
      text-align: center;
      font-weight: bold;
    }
    .status.success { background-color: #d4edda; color: #155724; }
    .status.error { background-color: #f8d7da; color: #721c24; }
    .back-home {
      text-align: center;
      margin-bottom: 16px;
    }
    .back-home a {
      text-decoration: none;
      color: #1976D2;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-home">
      <a href="index.html">🔙 Kembali ke Beranda</a>
    </div>

    <h1>📝 Catatan Penting per Market</h1>

    <label for="market-select">Pilih Market:</label>
    <select id="market-select">
      <option value="">-- Pilih Market --</option>
      <option value="Cambodia">Cambodia</option>
      <option value="Sidney">Sidney</option>
      <option value="China">China</option>
      <option value="Japan">Japan</option>
      <option value="SGP">SGP</option>
      <option value="Taiwan">Taiwan</option>
      <option value="Hongkong">Hongkong</option>
      <option value="Nusa">Nusa</option>
    </select>

    <label for="catatan">Catatan:</label>
    <textarea id="catatan" placeholder="Masukkan catatan penting di sini (angka, huruf, dll)..."></textarea>

    <button id="btn-simpan">💾 Simpan ke Firebase</button>
    <button id="btn-salin" class="btn-secondary">📋 Salin Isi Catatan</button>

    <div id="status" class="status" style="display: none;"></div>
  </div>

  <!-- 🔥 Firebase SDK - DIPERBAIKI: Gunakan Compat + Auth -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="./config-firebase.js"></script>

  <script>
    // Inisialisasi dari config-firebase.js
    const db = firebase.database();
    const auth = firebase.auth();

    // ✅ PERBAIKAN: Cek login dari localStorage (Instan)
    let authReady = !!localStorage.getItem('currentUser');
    if (authReady) {
      console.log('✅ [rumah17] User terdeteksi dari localStorage');
    }

    // Backup: Dengarkan perubahan status dari Firebase Auth
    auth.onAuthStateChanged((user) => {
      if (user) {
        authReady = true;
        console.log('✅ [rumah17] Firebase Auth: User login terdeteksi:', user.email);
      } else {
        if (!localStorage.getItem('currentUser')) {
          authReady = false;
          console.log('⚠️ [rumah17] User benar-benar belum login');
        }
      }
    });

    // DOM Elements
    const marketSelect = document.getElementById('market-select');
    const catatanArea = document.getElementById('catatan');
    const btnSimpan = document.getElementById('btn-simpan');
    const btnSalin = document.getElementById('btn-salin');
    const statusDiv = document.getElementById('status');

    // Fungsi Tampilkan Status (100% UTUH)
    function showStatus(msg, isSuccess = true) {
      statusDiv.textContent = msg;
      statusDiv.className = `status ${isSuccess ? 'success' : 'error'}`;
      statusDiv.style.display = 'block';
      setTimeout(() => statusDiv.style.display = 'none', 3000);
    }

    // 🔽 Load catatan saat market dipilih (100% UTUH + cek auth)
    marketSelect.addEventListener('change', async () => {
      const market = marketSelect.value;
      if (!market) {
        catatanArea.value = '';
        return;
      }

      // ✅ PERBAIKAN: Cek auth sebelum load
      if (!authReady) {
        showStatus("⚠️ Anda belum login. Silakan login dulu.", false);
        return;
      }

      try {
        // ✅ DIPERBAIKI: Path dari rumah18 → rumah17
        const snapshot = await db.ref(`rumah17/${market}`).once('value');
        if (snapshot.exists()) {
          catatanArea.value = snapshot.val().catatan || '';
          showStatus(`✅ Catatan untuk ${market} dimuat.`, true);
        } else {
          catatanArea.value = '';
          showStatus(`ℹ️ Belum ada catatan untuk ${market}.`, true);
        }
      } catch (err) {
        console.error("Gagal muat catatan:", err);
        showStatus("❌ Gagal muat catatan: " + err.message, false);
        catatanArea.value = '';
      }
    });

    // 💾 Simpan ke Firebase (100% UTUH + cek auth)
    btnSimpan.addEventListener('click', async () => {
      // ✅ PERBAIKAN: Cek auth sebelum save
      if (!authReady) {
        showStatus("⚠️ Anda belum login. Silakan login dulu.", false);
        return;
      }

      const market = marketSelect.value;
      const catatan = catatanArea.value.trim();

      if (!market) {
        showStatus("⚠️ Pilih market terlebih dahulu.", false);
        return;
      }

      try {
        // ✅ DIPERBAIKI: Path dari rumah18 → rumah17
        await db.ref(`rumah17/${market}`).set({
          catatan: catatan,
          lastUpdated: new Date().toISOString()
        });
        showStatus(`✅ Catatan untuk ${market} tersimpan!`, true);
      } catch (err) {
        console.error("Gagal simpan:", err);
        showStatus("❌ Gagal menyimpan catatan: " + err.message, false);
      }
    });

    // 📋 Salin Isi Catatan (100% UTUH)
    btnSalin.addEventListener('click', () => {
      const text = catatanArea.value;
      if (!text) {
        showStatus("ℹ️ Tidak ada teks untuk disalin.", false);
        return;
      }

      navigator.clipboard.writeText(text).then(() => {
        showStatus("📋 Teks disalin ke clipboard!", true);
      }).catch(err => {
        console.error("Gagal salin:", err);
        showStatus("❌ Gagal menyalin teks.", false);
      });
    });
  </script>
</body>
</html>
