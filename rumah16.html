<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rumah16</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22d3ee;
      --accent2: #a78bfa;
      --danger: #ef4444;
      --ok: #10b981;
    }
    body {
      margin: 0;
      background: radial-gradient(1200px 800px at 20% 20%, #0b1324, #0a1020 60%, #070b18);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      line-height: 1.6;
      padding: 24px;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
    }
    .back-home {
      text-align: right;
      margin-bottom: 16px;
    }
    .back-home a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      margin: 0 0 20px;
      letter-spacing: 0.2px;
    }
    .card {
      background: linear-gradient(180deg, #121826, #0f1624);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    select, input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      background: #0c1220;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    select:focus, input:focus {
      border-color: var(--accent);
    }
    button {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #0b1020;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s;
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: #0c1220;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .sheet {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
      transition: opacity 0.2s;
    }
    .sheet.filtered-out {
      display: none;
    }
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .sheet textarea {
      width: 100%;
      min-height: 100px;
      background: #0c1220;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px;
      font-family: monospace;
      font-size: 0.95rem;
      resize: none;
      overflow: hidden;
      box-sizing: border-box;
    }
    .sheet textarea:focus {
      border-color: var(--accent);
      outline: none;
    }
    .sheet-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .btn-salin { background: linear-gradient(90deg, var(--ok), #34d399); color: #0b1020; padding: 6px 12px; font-size: 0.9rem; }
    .btn-simpan { background: linear-gradient(90deg, #FF9800, #FFB347); color: #0b1020; padding: 6px 12px; font-size: 0.9rem; }
    .btn-hapus { background: linear-gradient(90deg, var(--danger), #f87171); color: #fff; padding: 6px 12px; font-size: 0.9rem; }
    .status {
      text-align: center;
      min-height: 24px;
      margin: 12px 0;
      font-weight: 600;
    }
    .success { color: var(--ok); }
    .error { color: var(--danger); }
    .info { color: var(--accent); }
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .toolbar input[type="text"] {
      flex: 1;
      min-width: 200px;
      margin-bottom: 0;
    }
    .counter {
      display: inline-block;
      background: rgba(34, 211, 238, 0.15);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-left: 8px;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-style: italic;
    }
    .loading::before {
      content: "⏳ ";
    }
    .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 12px;
      background: rgba(34, 211, 238, 0.1);
      border-radius: 10px;
      font-size: 0.9rem;
    }
    .user-info span {
      color: var(--accent);
      font-weight: 600;
    }
    .btn-logout {
      background: var(--danger);
      color: #fff;
      padding: 6px 12px;
      font-size: 0.85rem;
    }
    .login-form {
      max-width: 400px;
      margin: 60px auto;
    }
    .login-form h2 {
      text-align: center;
      margin-bottom: 24px;
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="back-home">
      <a href="index.html">← Kembali ke Beranda</a>
    </div>

    <!-- Login Form (tampil jika belum login) -->
    <div id="loginSection" class="login-form hidden">
      <h2>🔐 Login Required</h2>
      <div class="card">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="email@example.com" />
        
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Password" />
        
        <button id="btnLogin" style="width:100%;">Login</button>
        <div id="loginStatus" class="status"></div>
      </div>
    </div>

    <!-- Main Content (tampil jika sudah login) -->
    <div id="mainSection" class="hidden">
      <div class="user-info">
        <span>👤 <span id="userEmail"></span></span>
        <button class="btn-logout" id="btnLogout">Logout</button>
      </div>

      <h1>rumah16 <span id="counter" class="counter" style="display:none;">0</span></h1>

      <div class="card">
        <label for="marketSelect">Pilih Market</label>
        <select id="marketSelect">
          <option value="">-- Pilih Market --</option>
          <option value="Cambodia">Cambodia</option>
          <option value="Sidney">Sidney</option>
          <option value="China">China</option>
          <option value="Japan">Japan</option>
          <option value="SGP">SGP</option>
          <option value="Taiwan">Taiwan</option>
          <option value="Hongkong">Hongkong</option>
          <option value="Nusa">Nusa</option>
        </select>

        <div class="toolbar">
          <button id="btnTambahLembaran">📄 Tambah Lembaran Kosong</button>
          <input type="text" id="searchInput" placeholder="🔍 Cari di lembaran..." style="display:none;">
        </div>
        <div id="status" class="status"></div>
      </div>

      <div id="lembaranContainer"></div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="./config-firebase.js"></script>

  <script>
    let selectedMarket = null;
    let isLoading = false;
    let currentUser = null;

    const dirtyState = new WeakMap();

    function showStatus(text, type = "") {
      const el = document.getElementById('status');
      if (!el) return;
      el.textContent = text;
      el.className = "status " + type;
      if (type === "success" || type === "info") {
        setTimeout(() => {
          if (el.textContent === text) el.textContent = "";
        }, 2500);
      }
    }

    function showLoginStatus(text, type = "") {
      const el = document.getElementById('loginStatus');
      if (!el) return;
      el.textContent = text;
      el.className = "status " + type;
    }

    function salinTeks(teks) {
      if (!teks) return showStatus("⚠️ Tidak ada yang disalin.", "error");
      if (navigator.clipboard) {
        navigator.clipboard.writeText(teks).then(() => {
          showStatus("✅ Disalin!", "success");
        }).catch(() => showStatus("❌ Gagal salin.", "error"));
      } else {
        const ta = document.createElement('textarea');
        ta.value = teks;
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          showStatus("✅ Disalin!", "success");
        } catch(e) {
          showStatus("❌ Gagal salin.", "error");
        }
        document.body.removeChild(ta);
      }
    }

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = (textarea.scrollHeight) + 'px';
    }

    function updateCounter() {
      const counter = document.getElementById('counter');
      if (!counter) return;
      const visible = document.querySelectorAll('.sheet:not(.filtered-out)').length;
      if (selectedMarket) {
        counter.textContent = visible;
        counter.style.display = 'inline-block';
      } else {
        counter.style.display = 'none';
      }
    }

    function buatLembaran(isi = "", key = null, timestamp = null) {
      const container = document.getElementById('lembaranContainer');
      const sheet = document.createElement('div');
      sheet.className = 'sheet';
      sheet.dataset.key = key || '';

      const waktu = timestamp
        ? new Date(timestamp).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' })
        : 'Belum disimpan';

      sheet.innerHTML = `
        <div class="sheet-header">
          <span class="sheet-time">${waktu}</span>
          <span class="sheet-status" style="color:var(--muted);">—</span>
        </div>
        <textarea placeholder="Ketik atau paste data..."></textarea>
        <div class="sheet-actions">
          <button class="btn-salin">📋 Salin</button>
          <button class="btn-simpan">💾 Simpan</button>
          <button class="btn-hapus" style="display:${key ? 'inline-block' : 'none'};">🗑️ Hapus</button>
        </div>
      `;

      const textarea = sheet.querySelector('textarea');
      const btnSalin = sheet.querySelector('.btn-salin');
      const btnSimpan = sheet.querySelector('.btn-simpan');
      const btnHapus = sheet.querySelector('.btn-hapus');
      const statusEl = sheet.querySelector('.sheet-status');

      textarea.value = isi;
      setTimeout(() => autoResize(textarea), 0);

      textarea.addEventListener('input', () => {
        autoResize(textarea);
        dirtyState.set(sheet, true);
        statusEl.textContent = '● Belum disimpan';
        statusEl.style.color = '#f59e0b';
      });

      btnSalin.addEventListener('click', () => salinTeks(textarea.value));

      btnSimpan.addEventListener('click', async () => {
        if (!selectedMarket) return showStatus("⚠️ Pilih market dulu.", "error");
        if (!textarea.value.trim()) return showStatus("⚠️ Tidak ada data.", "error");

        btnSimpan.disabled = true;
        const originalText = btnSimpan.textContent;
        btnSimpan.textContent = '⏳ Menyimpan...';

        try {
          const dataToSave = {
            isi: textarea.value,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            lastModifiedBy: currentUser.uid
          };

          if (sheet.dataset.key) {
            await firebase.database().ref(`rumah16/${selectedMarket}/${sheet.dataset.key}`).set(dataToSave);
            showStatus("✅ Diperbarui!", "success");
          } else {
            const newRef = firebase.database().ref(`rumah16/${selectedMarket}`).push();
            await newRef.set(dataToSave);
            sheet.dataset.key = newRef.key;
            btnHapus.style.display = 'inline-block';
            const waktuBaru = new Date().toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });
            sheet.querySelector('.sheet-time').textContent = waktuBaru;
            showStatus("✅ Tersimpan!", "success");
          }

          dirtyState.set(sheet, false);
          statusEl.textContent = '● Tersimpan';
          statusEl.style.color = 'var(--ok)';
        } catch (err) {
          console.error("Gagal simpan:", err);
          showStatus("❌ Gagal simpan: " + err.message, "error");
        } finally {
          btnSimpan.disabled = false;
          btnSimpan.textContent = originalText;
        }
      });

      btnHapus.addEventListener('click', async () => {
        if (!sheet.dataset.key) return;
        if (!confirm("Hapus lembaran ini?")) return;

        btnHapus.disabled = true;
        try {
          await firebase.database().ref(`rumah16/${selectedMarket}/${sheet.dataset.key}`).remove();
          sheet.style.opacity = '0';
          setTimeout(() => {
            sheet.remove();
            updateCounter();
          }, 200);
          showStatus("🗑️ Dihapus.", "success");
        } catch (err) {
          console.error("Gagal hapus:", err);
          showStatus("❌ Gagal hapus.", "error");
          btnHapus.disabled = false;
        }
      });

      container.appendChild(sheet);
      updateCounter();
      return sheet;
    }

    function tampilkanLoading() {
      const container = document.getElementById('lembaranContainer');
      container.innerHTML = '<div class="loading">Memuat data...</div>';
    }

    async function muatDataTersimpan(market) {
      if (!market) return;
      isLoading = true;
      tampilkanLoading();
      try {
        const snapshot = await firebase.database().ref(`rumah16/${market}`).once('value');
        const container = document.getElementById('lembaranContainer');
        container.innerHTML = '';

        if (snapshot.exists()) {
          const data = snapshot.val();
          const entries = Object.keys(data).map(key => ({
            key,
            isi: data[key].isi || "",
            timestamp: data[key].timestamp || 0
          }));
          entries.sort((a, b) => b.timestamp - a.timestamp);

          entries.forEach(entry => {
            buatLembaran(entry.isi, entry.key, entry.timestamp);
          });

          showStatus(`📊 ${entries.length} lembaran dimuat.`, "info");
        } else {
          showStatus("📭 Belum ada lembaran di market ini.", "info");
        }
      } catch (err) {
        console.error("Gagal muat data:", err);
        showStatus("❌ Gagal memuat data.", "error");
      } finally {
        isLoading = false;
        updateCounter();
      }
    }

    function cekDataBelumDisimpan() {
      const sheets = document.querySelectorAll('.sheet');
      for (const sheet of sheets) {
        if (dirtyState.get(sheet)) return true;
      }
      return false;
    }

    function setupSearch() {
      const searchInput = document.getElementById('searchInput');
      searchInput.addEventListener('input', () => {
        const keyword = searchInput.value.toLowerCase().trim();
        const sheets = document.querySelectorAll('.sheet');
        let visibleCount = 0;
        sheets.forEach(sheet => {
          const text = sheet.querySelector('textarea').value.toLowerCase();
          if (!keyword || text.includes(keyword)) {
            sheet.classList.remove('filtered-out');
            visibleCount++;
          } else {
            sheet.classList.add('filtered-out');
          }
        });
        updateCounter();
      });
    }

    // Auth functions
    function tampilkanLogin() {
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('mainSection').classList.add('hidden');
    }

    function tampilkanMain(email) {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('mainSection').classList.remove('hidden');
      document.getElementById('userEmail').textContent = email;
    }

    async function login(email, password) {
      try {
        const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
        currentUser = userCredential.user;
        tampilkanMain(currentUser.email);
        initApp();
      } catch (err) {
        console.error("Login error:", err);
        showLoginStatus("❌ " + err.message, "error");
      }
    }

    async function logout() {
      if (cekDataBelumDisimpan()) {
        if (!confirm("Ada data belum disimpan. Yakin ingin logout?")) return;
      }
      await firebase.auth().signOut();
      currentUser = null;
      selectedMarket = null;
      localStorage.removeItem('marketAktif');
      tampilkanLogin();
    }

    function initApp() {
      const marketSelect = document.getElementById('marketSelect');
      const btnTambah = document.getElementById('btnTambahLembaran');
      const searchInput = document.getElementById('searchInput');

      setupSearch();

      const marketAktif = localStorage.getItem('marketAktif');
      if (marketAktif) {
        marketSelect.value = marketAktif;
        selectedMarket = marketAktif;
        searchInput.style.display = 'block';
        muatDataTersimpan(marketAktif);
      }

      marketSelect.addEventListener('change', (e) => {
        const newMarket = e.target.value;

        if (cekDataBelumDisimpan()) {
          if (!confirm("Ada lembaran yang belum disimpan. Yakin ingin berpindah market? Data yang belum disimpan akan hilang.")) {
            marketSelect.value = selectedMarket || '';
            return;
          }
        }

        selectedMarket = newMarket;
        if (selectedMarket) {
          localStorage.setItem('marketAktif', selectedMarket);
          searchInput.style.display = 'block';
          searchInput.value = '';
          muatDataTersimpan(selectedMarket);
        } else {
          localStorage.removeItem('marketAktif');
          searchInput.style.display = 'none';
          document.getElementById('lembaranContainer').innerHTML = '';
          updateCounter();
        }
      });

      btnTambah.addEventListener('click', () => {
        if (!selectedMarket) {
          showStatus("⚠️ Pilih market dulu.", "error");
          return;
        }
        const sheet = buatLembaran();
        sheet.querySelector('textarea').focus();
        sheet.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!firebase.apps.length) {
        alert("⚠️ Firebase gagal inisialisasi.");
        return;
      }

      const btnLogin = document.getElementById('btnLogin');
      const btnLogout = document.getElementById('btnLogout');

      btnLogin.addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) {
          showLoginStatus("⚠️ Email dan password wajib diisi.", "error");
          return;
        }
        btnLogin.disabled = true;
        btnLogin.textContent = '⏳ Logging in...';
        login(email, password).finally(() => {
          btnLogin.disabled = false;
          btnLogin.textContent = 'Login';
        });
      });

      btnLogout.addEventListener('click', logout);

      // Cek auth state
      firebase.auth().onAuthStateChanged((user) => {
        if (user) {
          currentUser = user;
          tampilkanMain(user.email);
          initApp();
        } else {
          currentUser = null;
          tampilkanLogin();
        }
      });
    });
  </script>
</body>
</html>
